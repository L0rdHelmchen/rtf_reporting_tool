services:
  postgres:
    image: postgres:15-alpine
    container_name: rtf-postgres
    environment:
      POSTGRES_DB: rtf_reporting
      POSTGRES_USER: rtf_user
      POSTGRES_PASSWORD: rtf_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtf_user -d rtf_reporting"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: rtf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health/ping || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: rtf-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://rtf_user:rtf_password@postgres:5432/rtf_reporting
      REDIS_URL: redis://redis:6379
      JWT_SECRET: rtf-jwt-secret-development-key-32chars-min
      API_PORT: 3001
      RATE_LIMIT_MAX_REQUESTS: 1000
    volumes:
      - ./backend:/app/backend    # Source live gemountet
      - ./shared:/app/shared      # Shared live gemountet
      - backend_node_modules:/app/node_modules   # node_modules aus Image
      - ./RTF_Validierungsdateien:/app/RTF_Validierungsdateien:ro  # Bundesbank XBRL files
    working_dir: /app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: rtf-frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend  # Source live gemountet
      - ./shared:/app/shared      # Shared live gemountet
      - frontend_node_modules:/app/node_modules  # node_modules aus Image
    working_dir: /app/frontend
    depends_on:
      backend:
        condition: service_started
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  default:
    name: rtf-network