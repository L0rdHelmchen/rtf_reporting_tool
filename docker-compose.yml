services:
  postgres:
    image: postgres:15-alpine
    container_name: rtf-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtf_user -d rtf_reporting"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: rtf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health/ping || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: rtf-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: ${API_PORT}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
    volumes:
      - ./backend:/app/backend  # Source live gemountet
      - ./shared:/app/shared      # Shared live gemountet
      - ./RTF_Validierungsdateien:/app/RTF_Validierungsdateien:ro  # Bundesbank XBRL files
    working_dir: /app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: rtf-frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend  # Source live gemountet
      - ./shared:/app/shared      # Shared live gemountet
    working_dir: /app/frontend
    depends_on:
      backend:
        condition: service_started
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  default:
    name: rtf-network